<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>StampKE — Digital Stamp & eSign Platform</title>
    <meta name="description" content="StampKE — Kenya's professional platform for digital stamps, legally binding e-signatures, PDF editing, and business document management. LSK compliant.">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://stampke.vercel.app">

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <link rel="stylesheet" href="/src/index.css">
    <style>
      body { font-family: 'Nunito Sans', 'Segoe UI', system-ui, sans-serif; background-color: #f8faff; }
      .font-stamp { font-family: 'Crimson Pro', serif; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
    <script>
      // Register PWA Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('[StampKE SW] Registered:', reg.scope))
            .catch(err => console.warn('[StampKE SW] Registration failed (non-fatal):', err));
        });
      }
    </script>
</body>
</html>
